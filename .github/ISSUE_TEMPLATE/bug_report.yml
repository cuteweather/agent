name: Bug report
description: Report a problem with a skill, script, or repository setup.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the problem?
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Affected skill
      description: Skill folder name, if applicable
      placeholder: image-search
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
